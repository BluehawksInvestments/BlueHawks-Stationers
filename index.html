<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueHawks Stationers</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #0b3d91;
  color: white;
  padding: 20px;
  text-align: center;
}

header h1 { margin: 0; }
header p { font-style: italic; }

.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

button {
  background: #0b3d91;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
}

.cart {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

.total {
  font-size: 18px;
  font-weight: bold;
}

.footer {
  text-align: center;
  padding: 20px;
}

.contact-btns a {
  display: inline-block;
  margin: 5px;
  text-decoration: none;
  padding: 10px;
  border-radius: 5px;
  color: white;
}

.whatsapp { background: green; }
.email { background: #555; }

</style>
</head>

<body>

<header>
  <h1>BlueHawks Stationers</h1>
  <p>"Noted!"</p>
</header>

<div class="container">

  <div class="card">
    <h3>Select Product</h3>

    <label>Product</label>
    <select id="product">
      <option value="50">A5 80 pages</option>
      <option value="65">A5 120 pages</option>
      <option value="80">A5 200 pages</option>
      <option value="100">A4 120 pages</option>
      <option value="130">A4 200 pages</option>
      <option value="100">School Diary</option>
      <option value="100">Assessment Book</option>
    </select>

    <label>Type</label>
    <select>
      <option>Single Line</option>
      <option>Square</option>
      <option>Drawing / Scrap</option>
    </select>

    <label>Quantity</label>
    <input type="number" id="qty" value="1">

    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="cart">
    <h3>Cart</h3>
    <ul id="cartList"></ul>
    <p class="total">Total: KES <span id="total">0</span></p>
  </div>

  <div class="card">
    <h3>Request a Quote</h3>

    <input type="text" id="name" placeholder="School Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="text" id="phone" placeholder="Phone Number">

    <button onclick="sendQuote()">Request Quote</button>
  </div>

  <div class="footer">
    <h3>Contact Us</h3>

    <div class="contact-btns">
      <a class="whatsapp" href="https://wa.me/254723720681" target="_blank">WhatsApp</a>
      <a class="email" href="mailto:nickkndegwa@gmail.com">Email</a>
    </div>
  </div>

</div>

<script>
let cart = [];
let total = 0;

function addToCart() {
  let product = document.getElementById("product");
  let price = parseInt(product.value);
  let name = product.options[product.selectedIndex].text;
  let qty = parseInt(document.getElementById("qty").value);

  let itemTotal = price * qty;
  total += itemTotal;

  cart.push(name + " x" + qty + " = " + itemTotal);

  updateCart();
}

function updateCart() {
  let list = document.getElementById("cartList");
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

function sendQuote() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;

  let cartDetails = cart.join("%0D%0A");

  let subject = "Quote Request - BlueHawks Stationers";
  let body = "School: " + name +
             "%0D%0AEmail: " + email +
             "%0D%0APhone: " + phone +
             "%0D%0A%0D%0AOrder:%0D%0A" + cartDetails +
             "%0D%0A%0D%0ATotal: KES " + total;

  window.location.href = `mailto:${email},bluehawksinvestment@gmail.com?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
