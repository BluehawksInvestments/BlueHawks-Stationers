<div id="products" class="section">
<h2>Our Products</h2>

<div class="grid">

<!-- A5 BOOKS -->
<div class="card">
<h3>A5 Exercise Books</h3>

<label>Pages</label>
<select id="a5pages" onchange="updatePrice('a5')">
  <option value="80">80</option>
  <option value="120">120</option>
  <option value="200">200</option>
</select>

<label>Type</label>
<select>
  <option>Single Line</option>
  <option>Square</option>
  <option>Drawing</option>
</select>

<label>Quantity</label>
<input type="number" id="a5qty">

<p id="a5price"></p>

<button onclick="addA5()">Add to Cart</button>
</div>

<!-- A4 BOOKS -->
